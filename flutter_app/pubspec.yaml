name: dms_pro_flutter
description: A comprehensive retail distribution management system

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  google_sign_in: ^6.2.1
  go_router: ^13.2.0
  flutter_riverpod: ^2.4.9
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5
  lottie: ^2.7.0
  shimmer: ^3.0.0
  intl: ^0.19.0
  uuid: ^4.5.3
  http: ^1.6.0
  google_fonts: ^6.3.3
  fl_chart: ^0.66.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  flutter_gen_runner: ^5.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

flutter_gen:
  output: lib/generated/
  line_length: 80
